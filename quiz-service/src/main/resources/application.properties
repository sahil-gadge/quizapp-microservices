spring.application.name=quiz-service
spring.datasource.url=${quizdburl}
spring.datasource.username=${username}
spring.datasource.password=${password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8090

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

resilience4j.circuitbreaker.instances.questionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.questionService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.questionService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.questionService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.questionService.sliding-window-size=10